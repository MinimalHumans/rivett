name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install cargo-wix
        run: cargo install cargo-wix --version 0.3.9
        
      - name: Build Rivett
        run: cargo build --release
        
      - name: Build MSI Installer
        run: cargo wix --no-build --nocapture
        
      - name: Package Portable ZIP
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          mkdir dist
          cp target/release/rivett.exe dist/
          cp README.md dist/
          Compress-Archive -Path dist/* -DestinationPath "rivett-${VERSION}-windows-portable.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rivett-*-windows-portable.zip
            target/wix/*.msi
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev squashfs-tools libwayland-dev libxkbcommon-dev libgtk-3-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install packaging tools
        run: |
          cargo install cargo-bundle --locked
          cargo install cargo-deb --locked
      - name: Build release binary
        run: cargo build --release
      - name: Build AppImage
        run: cargo bundle --release --format appimage
      - name: Build Deb package
        # cargo-deb maps assets to correct system paths so AppStream metainfo
        # lands at /usr/share/metainfo/ (required for KDE Discover name lookup).
        run: cargo deb --no-build
      - name: Upload Linux Bundles
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/debian/*.deb
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked
      - name: Build .app bundle
        run: cargo bundle --release --format osx
      - name: Sign and package .app bundle
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          codesign --force --deep --sign - target/release/bundle/osx/Rivett.app
          ditto -c -k --keepParent target/release/bundle/osx/Rivett.app rivett-${VERSION}-macos.zip
      - name: Upload macOS Bundle
        uses: softprops/action-gh-release@v2
        with:
          files: rivett-*-macos.zip
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
