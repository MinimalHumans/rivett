name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Install cargo-wix
        run: cargo install cargo-wix --version 0.3.9
        
      - name: Build Rivett
        run: cargo build --release
        
      - name: Build MSI Installer
        run: cargo wix --no-build --nocapture
        
      - name: Package Portable ZIP
        run: |
          mkdir dist
          cp target/release/rivett.exe dist/
          cp README.md dist/
          Compress-Archive -Path dist/* -DestinationPath rivett-windows-portable.zip
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rivett-windows-portable.zip
            target/wix/*.msi
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev squashfs-tools libwayland-dev libxkbcommon-dev libgtk-3-dev
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install packaging tools
        run: |
          cargo install cargo-bundle --locked
          cargo install cargo-deb --locked
      - name: Build release binary
        run: cargo build --release
      - name: Build AppImage
        run: cargo bundle --release --format appimage
      - name: Build Deb package
        # cargo-deb maps assets to correct system paths so AppStream metainfo
        # lands at /usr/share/metainfo/ (required for KDE Discover name lookup).
        run: cargo deb --no-build
      - name: Upload Linux Bundles
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/debian/*.deb
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked
      - name: Build .app bundle
        run: cargo bundle --release --format osx
      - name: Zip .app bundle
        run: |
          cd target/release/bundle/osx
          zip -r ../../../../rivett-macos.zip rivett.app
      - name: Upload macOS Bundle
        uses: softprops/action-gh-release@v2
        with:
          files: rivett-macos.zip
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
